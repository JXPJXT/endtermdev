name: dockerbuildpush

on:
  push:

jobs:
  buildimage:
    runs-on: ubuntu-latest
    steps:
    - name: copycode
      uses: actions/checkout@v4

    - name: build docker image
      run: docker build -t myapp:v1 . 

  pushimage:
    runs-on: ubuntu-latest
    steps:
    - name: copy image
      uses: actions/checkout@v4

    - name: login ghcr
      run: docker login ghcr.io -u ${{ secrets.GHCR_USERNAME }} -p ${{ secrets.GHCR_TOKEN }}

    - name: tag image
      run: docker tag myapp:v1 ghcr.io/jxpjxt/myapp:v1

    - name: push image
      run: docker push ghcr.io/jxpjxt/myapp:v1

